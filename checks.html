<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Check Mattutini – Deloitte Room Management</title>
  <link rel="stylesheet" href="css/style.css?v=39">
  <style>
    /* ── CHECK CARD (nuovo flow) ── */
    .check-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .check-card.done-ok   { border-color: rgba(134,188,37,.4); }
    .check-card.done-ko   { border-color: rgba(255,77,77,.35); }
    .check-card.done-fixed { border-color: rgba(134,188,37,.4); }

    .check-card-header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; cursor: pointer;
      user-select: none; -webkit-user-select: none;
      transition: background .15s;
    }
    .check-card-header:hover { background: rgba(255,255,255,.03); }
    .check-card-header:active { background: rgba(255,255,255,.05); }

    .check-status-dot {
      width: 12px; height: 12px; border-radius: 50%;
      flex-shrink: 0; transition: background .2s;
      background: var(--border);
    }
    .check-card.done-ok    .check-status-dot { background: var(--green); box-shadow: 0 0 6px rgba(134,188,37,.5); }
    .check-card.done-ko    .check-status-dot { background: var(--red);   box-shadow: 0 0 6px rgba(255,77,77,.5); }
    .check-card.done-fixed .check-status-dot { background: var(--green); box-shadow: 0 0 6px rgba(134,188,37,.5); }

    .check-card-name  { flex: 1; font-size: 14px; font-weight: 600; }
    .check-card-meta  { font-size: 12px; color: var(--text-muted); }
    .check-card-arrow { color: var(--text-faint); font-size: 12px; transition: transform .2s; flex-shrink: 0; }
    .check-card.open  .check-card-arrow { transform: rotate(180deg); }

    .check-card-body {
      display: none; padding: 0 18px 18px;
      border-top: 1px solid var(--border);
    }
    .check-card.open .check-card-body { display: block; }

    .check-body-desc {
      font-size: 13px; color: var(--text-muted); line-height: 1.6;
      padding: 14px 0;
    }

    .check-action-btns {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .btn-check-ok {
      flex: 1; min-width: 160px;
      background: rgba(134,188,37,.15); color: var(--green);
      border: 1.5px solid rgba(134,188,37,.4);
      border-radius: 10px; padding: 14px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all .15s; font-family: var(--font-ui);
      min-height: 52px;
    }
    .btn-check-ok:hover { background: rgba(134,188,37,.25); border-color: var(--green); }
    .btn-check-ok:active { transform: scale(.97); }

    .btn-check-ko {
      flex: 1; min-width: 160px;
      background: rgba(255,77,77,.1); color: var(--red);
      border: 1.5px solid rgba(255,77,77,.3);
      border-radius: 10px; padding: 14px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all .15s; font-family: var(--font-ui);
      min-height: 52px;
    }
    .btn-check-ko:hover { background: rgba(255,77,77,.2); border-color: var(--red); }
    .btn-check-ko:active { transform: scale(.97); }

    /* ── RESOLUTION PANEL ── */
    .resolution-panel {
      display: none;
      margin-top: 16px;
      background: var(--bg-card2);
      border: 1.5px solid rgba(255,77,77,.3);
      border-radius: 10px;
      padding: 16px;
    }
    .resolution-panel.open { display: block; }

    .res-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700; color: var(--red);
      margin-bottom: 12px;
    }
    .res-time { font-size: 11px; color: var(--text-faint); font-weight: 400; margin-left: auto; }

    .res-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 8px; }

    .quick-fixes { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .fix-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-card);
      cursor: pointer; font-size: 13px; font-family: var(--font-ui);
      color: var(--text); text-align: left; transition: all .15s;
      min-height: 44px;
    }
    .fix-btn:hover { border-color: var(--orange); background: rgba(240,160,48,.06); }
    .fix-btn.applied { border-color: var(--green); background: rgba(134,188,37,.06); color: var(--green); }
    .fix-icon { font-size: 14px; flex-shrink: 0; }

    .res-note { margin-bottom: 14px; }
    .res-note textarea {
      width: 100%; padding: 9px 12px;
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px;
      font-family: var(--font-ui); resize: none; min-height: 70px;
    }
    .res-note textarea:focus { outline: none; border-color: var(--orange); }

    .res-outcome-btns { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .btn-resolved {
      flex: 1; min-width: 120px; min-height: 44px;
      background: rgba(134,188,37,.15); color: var(--green);
      border: 1.5px solid rgba(134,188,37,.4); border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font-ui);
      transition: all .15s;
    }
    .btn-resolved:hover { background: rgba(134,188,37,.25); }

    .res-divider { height: 1px; background: rgba(255,77,77,.2); margin: 14px 0; }

    .btn-intervento {
      width: 100%; min-height: 48px;
      background: rgba(255,77,77,.08);
      border: 1.5px dashed rgba(255,77,77,.4);
      border-radius: 8px; color: var(--red);
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: var(--font-ui);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all .15s;
    }
    .btn-intervento:hover { background: rgba(255,77,77,.15); border-style: solid; }
    .btn-intervento:active { transform: scale(.98); }

    /* ── SECTION HEADER ── */
    .section-block { margin-bottom: 20px; }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; padding: 0 2px;
    }
    .section-icon { font-size: 16px; }
    .section-label {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .8px; color: var(--text-muted);
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-count { font-size: 11px; color: var(--text-faint); }
    .section-ok-count { font-size: 11px; color: var(--green); font-weight: 700; }

    /* ── SUMMARY BAR ── */
    .summary-bar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 16px;
      padding: 14px 18px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 20px;
    }
    .sb-item { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 700; }
    .sb-dot  { width: 10px; height: 10px; border-radius: 50%; }
    .sb-spacer { flex: 1; }
    .sb-progress {
      display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted);
    }
    .sb-progress-bar {
      width: 120px; height: 6px; background: var(--bg-card2);
      border-radius: 3px; overflow: hidden;
    }
    .sb-progress-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .4s; }

    /* State: done overlay */
    .check-card.done-ok .check-action-btns,
    .check-card.done-fixed .check-action-btns { display: none; }
    .done-stamp {
      display: none; font-size: 12px; font-weight: 700;
      padding: 10px 0 2px;
    }
    .check-card.done-ok    .done-stamp { display: block; color: var(--green); }
    .check-card.done-fixed .done-stamp { display: block; color: var(--green); }
  </style>
</head>

<script>
/* ─────────────────────────────────────
   STATE
───────────────────────────────────── */
let currentRoom = 'solaria-roma';
// checkState[id] = { state: 'ok'|'ko'|'fixed'|null, ts: ISO, note:'', fixApplied:'' }
let checkState  = {};
// ── SESSIONI: più check nella stessa giornata (mattutino, pre-evento, ...) ──
let currentSession = 1;            // sessione attiva
let daySessions    = [1];          // sessioni esistenti oggi per la sala
let allSessionsData = { 1: {} };   // { sessione: { id: stato } }
const todayStr = () => new Date().toISOString().slice(0, 10);
// il check_id salvato su DB porta il prefisso della sessione (la #1 resta senza prefisso, per compatibilità)
function sessionKey(id) { return currentSession === 1 ? id : `s${currentSession}::${id}`; }
function parseSession(key) { const m = key.match(/^s(\d+)::([\s\S]+)$/); return m ? { s: +m[1], id: m[2] } : { s: 1, id: key }; }

/* ─────────────────────────────────────
   INIT
───────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  if (!requireAuth()) return;

  const now = new Date();
  document.getElementById('check-date').textContent =
    now.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  document.querySelectorAll('#room-tabs .tab').forEach(tab => {
    tab.addEventListener('click', async () => {
      await flushSave();   // salva la sala corrente PRIMA di cambiare (niente perdite)
      document.querySelectorAll('#room-tabs .tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentRoom = tab.dataset.room;
      await loadState(); renderAll();
    });
  });

  document.getElementById('btn-salva').addEventListener('click', saveSession);
  document.getElementById('btn-storico').addEventListener('click', () => {
    renderStorico();
    openModal('modal-storico');
  });

  loadState().then(() => renderAll());
});

async function loadState() {
  const all = await db.getCheckState(currentRoom, todayStr());   // { check_id(eventualmente prefissato): stato }
  allSessionsData = {};
  for (const [k, v] of Object.entries(all)) {
    const { s, id } = parseSession(k);
    (allSessionsData[s] = allSessionsData[s] || {})[id] = v;
  }
  daySessions = Object.keys(allSessionsData).map(Number).sort((a, b) => a - b);
  if (!daySessions.length) { daySessions = [1]; allSessionsData[1] = {}; }
  currentSession = daySessions[daySessions.length - 1];   // apri l'ultima sessione del giorno
  checkState = allSessionsData[currentSession];
}

// apre una NUOVA sessione di check nella giornata (es. pre-evento / pre-partita)
function newCheck() {
  const next = Math.max(...daySessions) + 1;
  daySessions.push(next);
  allSessionsData[next] = {};
  currentSession = next;
  checkState = allSessionsData[next];
  document.getElementById('btn-salva').disabled = true;
  renderAll();
  toast(`Nuovo check aperto — Check #${next} ✓`, 'success');
}
// passa a una sessione già esistente del giorno
function showSession(n) {
  currentSession = n;
  checkState = allSessionsData[n] || (allSessionsData[n] = {});
  renderAll();
}

// "Chiudi e segnala": salva la sessione, apre i ticket in Anomalie per ogni
// anomalia e invia il report (completo per il mattutino, mirato per i successivi).
async function saveSession() {
  const allItems = (CHECK_ITEMS[currentRoom] || []).flatMap(s => s.items);
  const done = allItems.filter(i => checkState[i.id]?.state).length;
  const koItems = allItems.filter(i => checkState[i.id]?.state === 'ko');
  // guardie coerenti col gating del bottone
  if (currentSession === 1 && done < allItems.length) {
    toast(`Completa tutti i controlli prima di chiudere (${allItems.length - done} rimasti)`, 'error');
    return;
  }
  if (currentSession > 1 && koItems.length === 0) {
    toast('In un check successivo segnala almeno un\'anomalia sopraggiunta', 'error');
    return;
  }
  const t = todayStr();
  await Promise.all(Object.entries(checkState).map(([id, s]) => db.saveCheckState(currentRoom, t, sessionKey(id), s)));
  document.getElementById('btn-salva').disabled = true;
  const created = await createTicketsForSession(koItems); // apre i ticket lato Anomalie
  await sendCheckReport();
  toast(created > 0
    ? `Chiuso e segnalato ✓ — ${created} ticket ${created === 1 ? 'aperto' : 'aperti'} in Anomalie`
    : 'Check chiuso e report inviato ✓', 'success');
}

// Apre un ticket in Anomalie per ogni anomalia del check (idempotente: una sola
// volta per voce/sessione grazie alla mappa check→ticket in localStorage).
async function createTicketsForSession(koItems) {
  if ((typeof DEMO_MODE !== 'undefined' && DEMO_MODE) || !koItems.length) return 0;
  const room = ROOMS.find(r => r.id === currentRoom);
  const roomLabel = room ? `${room.name} – ${room.city}` : currentRoom;
  const dateStr = new Date().toLocaleDateString('it-IT');
  const t = todayStr();
  const u = currentUser();
  const origine = currentSession > 1 ? `Check #${currentSession} (durante la giornata)` : 'Check mattutino';
  let created = 0;
  for (const item of koItems) {
    if (getCheckTicket(currentRoom, t, currentSession, item.id)) continue; // già segnalato
    const s = checkState[item.id] || {};
    const desc = [
      `Rilevata durante: ${origine} — ${roomLabel} del ${dateStr}.`,
      s.note ? `Note presidio: ${s.note}` : '',
      s.fixApplied ? `Soluzione tentata: ${s.fixApplied}` : '',
    ].filter(Boolean).join('\n');
    try {
      const tk = await db.createTicket({
        room: currentRoom, priority: 'P1', category: 'altro',
        title: item.name, desc, segnalatore: u?.name || 'Presidio',
      });
      setCheckTicket(currentRoom, t, currentSession, item.id, tk.id);
      created++;
    } catch (e) { console.error('createTicket', item.id, e); }
  }
  return created;
}

// ── AUTOSAVE: ogni azione salva subito il singolo check (con prefisso sessione) ──
function autosave(id) {
  db.saveCheckState(currentRoom, todayStr(), sessionKey(id), checkState[id]).catch(e => console.warn('autosave', id, e));
  showAutosaved();
}
let _noteTimers = {};
function autosaveNote(id) {
  const room = currentRoom, t = todayStr(), key = sessionKey(id), data = { ...checkState[id] };
  clearTimeout(_noteTimers[key]);
  _noteTimers[key] = setTimeout(() => {
    db.saveCheckState(room, t, key, data).catch(e => console.warn('autosaveNote', id, e));
    showAutosaved();
  }, 600);
}
// salva TUTTA la sessione corrente (rete di sicurezza prima di cambiare sala)
async function flushSave() {
  const t = todayStr(), room = currentRoom, sess = currentSession;
  const keyFor = id => sess === 1 ? id : `s${sess}::${id}`;
  await Promise.all(Object.entries(checkState).map(([id, s]) => db.saveCheckState(room, t, keyFor(id), s).catch(() => {})));
}
let _autosaveT;
function showAutosaved() {
  const el = document.getElementById('autosave-badge');
  if (!el) return;
  el.style.opacity = '1';
  clearTimeout(_autosaveT);
  _autosaveT = setTimeout(() => { el.style.opacity = '0'; }, 1500);
}

async function sendCheckReport() {
  if (typeof DEMO_MODE !== 'undefined' && DEMO_MODE) return;
  try {
    const sections = CHECK_ITEMS[currentRoom] || [];
    const allItems = sections.flatMap(s => s.items);
    const room = ROOMS.find(r => r.id === currentRoom);
    const roomLabel = room ? `${room.name} – ${room.city}` : currentRoom;
    const dateStr = new Date().toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

    const done  = allItems.filter(i => checkState[i.id]?.state);
    const ok    = allItems.filter(i => ['ok','fixed'].includes(checkState[i.id]?.state));
    const kos   = allItems.filter(i => checkState[i.id]?.state === 'ko');
    const fixed = allItems.filter(i => checkState[i.id]?.state === 'fixed');

    const recips = (getSettings().emailRecipients || [])
      .filter(r => r.email && (r.events || []).includes('check-report')).map(r => r.email);
    const to = [...new Set(recips)];
    if (!to.length) return; // nessun destinatario configurato per il report

    const u = currentUser();
    // barra/tag in alto a 3 stati: rosso = anomalie persistenti, arancione = solo risolte sul momento, verde = tutto ok
    const accent = kos.length ? '#ff4d4d' : (fixed.length ? '#f0a030' : '#86BC25');
    const PORTAL = 'https://rooms.area62.it';
    const portalBtn = `<p style="margin-top:18px;"><a href="${PORTAL}/checks.html" style="display:inline-block;background:#86BC25;color:#0d0d0d;text-decoration:none;font-weight:700;padding:11px 22px;border-radius:8px;">Apri il portale →</a></p>`;
    // ── Anomalie RISOLTE SUL MOMENTO (stato 'fixed'): vanno sempre segnalate nel report ──
    const resolvedHtml = fixed.length
      ? `<h3 style="color:#b9770e;margin:18px 0 6px;">🔧 Anomalie risolte sul momento (${fixed.length})</h3>
         <ul style="margin:0 0 6px;padding-left:18px;">${fixed.map(i => {
            const st = checkState[i.id] || {};
            const extra = [st.fixApplied ? 'soluzione: ' + st.fixApplied : '', st.note].filter(Boolean).join(' · ');
            return `<li><b>${i.name}</b>${extra ? ' — ' + extra : ''}</li>`;
         }).join('')}</ul>
         <p style="font-size:13px;color:#666;">Rilevate durante il check e <b>risolte in autonomia</b> dal presidio: nessun intervento necessario.</p>`
      : '';

    // ── Anomalie che PERSISTONO: richiedono rapporto di intervento (allegato con stato) ──
    const anomListHtml = kos.length
      ? `<h3 style="color:#c00;margin:18px 0 6px;">⚠ Anomalie da gestire — richiedono rapporto di intervento (${kos.length})</h3>
         <ul style="margin:0 0 6px;padding-left:18px;">${kos.map(i => `<li><b>${i.name}</b>${checkState[i.id]?.note ? ' — ' + checkState[i.id].note : ''}</li>`).join('')}</ul>`
      : '';
    const ticketNote = kos.length
      ? `<p style="font-size:13px;color:#666;">In allegato il <b>rapporto di intervento</b> di ciascuna anomalia (stato: <b>Apertura rapporto</b>) ed è stato aperto un ticket in Anomalie. Gli aggiornamenti di stato proseguono sul portale.</p>`
      : '';
    const allClearHtml = (!kos.length && !fixed.length)
      ? `<p style="color:#5a8a00;font-size:15px;"><b>✓ Tutto a posto.</b> Nessuna anomalia rilevata durante il check.</p>` : '';

    // Banner di stato in cima: l'esito è chiaro al primo sguardo (coerente col colore della barra)
    const statusBanner = kos.length
      ? `<div style="background:rgba(255,77,77,.10);border-left:4px solid #ff4d4d;color:#c0392b;font-weight:800;padding:11px 14px;border-radius:6px;margin:0 0 14px;">⚠ Anomalie ancora presenti — richiesto rapporto di intervento</div>`
      : fixed.length
      ? `<div style="background:rgba(240,160,48,.14);border-left:4px solid #f0a030;color:#b9770e;font-weight:800;padding:11px 14px;border-radius:6px;margin:0 0 14px;">🔧 Anomalie rilevate ma risolte sul momento — nessun intervento necessario</div>`
      : `<div style="background:rgba(134,188,37,.14);border-left:4px solid #86BC25;color:#5a8a00;font-weight:800;padding:11px 14px;border-radius:6px;margin:0 0 14px;">✓ Tutto a posto — nessuna anomalia</div>`;

    // Oggetto leggibile: si capisce l'esito senza aprire la mail
    const subjBits = [];
    if (kos.length)   subjBits.push(`${kos.length} da gestire ⚠`);
    if (fixed.length) subjBits.push(`${fixed.length} risolte sul momento`);
    const subjTail = subjBits.length ? subjBits.join(' · ') : 'tutto ok ✓';

    let heading, bodyInner, subject;
    if (currentSession > 1) {
      // check successivo: report MIRATO agli eventi sopraggiunti durante la giornata
      heading = `Segnalazione durante la giornata — ${roomLabel}`;
      bodyInner =
        `${statusBanner}<p style="color:#666;text-transform:capitalize;">${dateStr} · Check #${currentSession}</p>
         ${resolvedHtml}${anomListHtml}${ticketNote}${allClearHtml}${portalBtn}`;
      subject = `Check #${currentSession} ${roomLabel} — ${subjTail}`;
    } else {
      // primo check mattutino: report COMPLETO, autoconsistente (leggibile senza portale)
      heading = `Check mattutino — ${roomLabel}`;
      bodyInner =
        `${statusBanner}<p style="color:#666;text-transform:capitalize;">${dateStr}</p>
         <table style="font-size:14px;border-collapse:collapse;margin:12px 0;">
           <tr><td style="color:#666;padding:3px 18px 3px 0;">Eseguiti</td><td>${done.length}/${allItems.length}</td></tr>
           <tr><td style="color:#666;padding:3px 18px 3px 0;">OK</td><td style="color:#5a8a00;"><b>${ok.length}</b></td></tr>
           <tr><td style="color:#666;padding:3px 18px 3px 0;">Risolte sul momento</td><td style="color:#b9770e;"><b>${fixed.length}</b></td></tr>
           <tr><td style="color:#666;padding:3px 18px 3px 0;">Da gestire</td><td style="color:#c00;"><b>${kos.length}</b></td></tr>
           <tr><td style="color:#666;padding:3px 18px 3px 0;">Presidio</td><td>${u?.name || '—'}</td></tr>
         </table>
         ${resolvedHtml}${anomListHtml}${ticketNote}${allClearHtml}${portalBtn}`;
      subject = `Check mattutino ${roomLabel} — ${subjTail}`;
    }
    const html = emailTemplate(heading, bodyInner, accent);

    const attachments = kos.map(i => ({
      filename: `rapporto-intervento-${i.id}.html`,
      content: btoa(unescape(encodeURIComponent(buildInterventoDoc(i, checkState[i.id] || {}, roomLabel, dateStr)))),
      mimetype: 'text/html',
    }));

    await db.sendEmail(to, subject, html, attachments);
    toast(`Report check inviato a ${to.length} destinatari ✓`, 'info');
  } catch (e) { console.error('report check', e); }
}

/* ─────────────────────────────────────

function renderSessionBar() {
  const bar = document.getElementById('session-bar');
  if (!bar) return;
  const label = (n) => {
    const ts = Object.values(allSessionsData[n] || {}).map(s => s && s.ts).filter(Boolean).sort()[0];
    const t = ts ? new Date(ts).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }) : '';
    return `Check ${n}${t ? ' · ' + t : ''}`;
  };
  const chips = daySessions.map(n => {
    const on = n === currentSession;
    return `<button onclick="showSession(${n})" style="font-size:12.5px;font-weight:700;border:1.5px solid ${on ? 'var(--green)' : 'var(--border)'};background:${on ? 'rgba(134,188,37,.15)' : 'var(--bg-card)'};color:${on ? 'var(--green)' : 'var(--text-muted)'};border-radius:20px;padding:6px 14px;cursor:pointer;">${label(n)}</button>`;
  }).join('');
  bar.innerHTML =
    `<span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);margin-right:2px;">Check del giorno</span>${chips}` +
    `<button onclick="newCheck()" title="Apri un nuovo check nella giornata (es. pre-evento)" style="font-size:12.5px;font-weight:700;border:1.5px dashed var(--green);background:transparent;color:var(--green);border-radius:20px;padding:6px 14px;cursor:pointer;">+ Nuovo check</button>`;
}

function renderAll() {
  renderSessionBar();
  const sections  = CHECK_ITEMS[currentRoom] || [];
  const isArmonia = currentRoom.includes('armonia');
  const container = document.getElementById('checks-container');

  container.className = `checks-wrap ${isArmonia ? 'armonia' : 'solaria'}`;

  const allItems = sections.flatMap(s => s.items);
  const done   = allItems.filter(i => checkState[i.id]?.state).length;
  const ok     = allItems.filter(i => ['ok','fixed'].includes(checkState[i.id]?.state)).length;
  const ko     = allItems.filter(i => checkState[i.id]?.state === 'ko').length;
  const pct    = allItems.length ? Math.round(done / allItems.length * 100) : 0;

  document.getElementById('sb-total').textContent = allItems.length;
  document.getElementById('sb-ok').textContent    = ok;
  document.getElementById('sb-ko').textContent    = ko;
  document.getElementById('sb-nd').textContent    = allItems.length - done;
  document.getElementById('sb-fill').style.width  = pct + '%';
  document.getElementById('sb-pct').textContent   = pct + '%';

  container.innerHTML = sections.map(sec => {
    const secOk  = sec.items.filter(i => ['ok','fixed'].includes(checkState[i.id]?.state)).length;
    const secDone = sec.items.filter(i => checkState[i.id]?.state).length;
    return `
    <div class="section-block">
      <div class="section-header">
        <span class="section-icon">${sec.icon}</span>
        <span class="section-label">${sec.section}</span>
        <div class="section-line"></div>
        ${secDone > 0
          ? `<span class="section-ok-count">${secOk}/${sec.items.length}</span>`
          : `<span class="section-count">${sec.items.length} voci</span>`
        }
      </div>
      ${sec.items.map(item => renderCard(item)).join('')}
    </div>`;
  }).join('');

  // Bind events
  container.querySelectorAll('.check-card-header').forEach(hdr => {
    hdr.addEventListener('click', () => toggleCard(hdr.dataset.id));
  });
  container.querySelectorAll('.btn-check-ok').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); markOk(btn.dataset.id); });
  });
  container.querySelectorAll('.btn-check-ko').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); markKo(btn.dataset.id); });
  });
  container.querySelectorAll('.fix-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); applyFix(btn.dataset.id, btn.dataset.fix); });
  });
  container.querySelectorAll('.btn-resolved').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); markFixed(btn.dataset.id); });
  });
  container.querySelectorAll('.btn-intervento').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); goToIntervento(btn.dataset.id); });
  });
  container.querySelectorAll('.res-note-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const id = inp.dataset.id;
      if (!checkState[id]) checkState[id] = {};
      checkState[id].note = e.target.value;
      updateSaveButton();
      autosaveNote(id);
    });
  });

  updateSaveButton();
}

// Gating del bottone "Chiudi e segnala":
//  • primo check (mattutino): abilitato solo a check COMPLETO (tutti i controlli marcati)
//  • check successivi (durante la giornata): abilitato appena c'è ≥1 anomalia da segnalare
function updateSaveButton() {
  const btn = document.getElementById('btn-salva');
  const hint = document.getElementById('save-hint');
  if (!btn) return;
  const allItems  = (CHECK_ITEMS[currentRoom] || []).flatMap(s => s.items);
  const done      = allItems.filter(i => checkState[i.id]?.state).length;
  const ko        = allItems.filter(i => checkState[i.id]?.state === 'ko').length;
  const remaining = allItems.length - done;
  if (currentSession === 1) {
    const complete = allItems.length > 0 && remaining === 0;
    btn.disabled = !complete;
    btn.title = complete
      ? 'Chiudi il check mattutino e invia il report a tutti'
      : `Completa tutti i controlli prima di chiudere (${remaining} rimasti)`;
    if (hint) hint.textContent = complete
      ? (ko ? `${ko} ${ko === 1 ? 'anomalia' : 'anomalie'} da segnalare` : 'Tutto ok — pronto per la chiusura')
      : `Check mattutino · ${remaining} controlli rimasti`;
  } else {
    btn.disabled = ko === 0;
    btn.title = ko
      ? 'Segnala le anomalie di questo check e invia il report'
      : 'Segna almeno un\'anomalia sopraggiunta da segnalare';
    if (hint) hint.textContent = ko
      ? `Check #${currentSession} · ${ko} ${ko === 1 ? 'anomalia' : 'anomalie'} da segnalare`
      : `Check #${currentSession} · segnala le anomalie sopraggiunte`;
  }
}

/* ─────────────────────────────────────
   RENDER CARD
───────────────────────────────────── */
function renderCard(item) {
  const s     = checkState[item.id] || {};
  const state = s.state || null;
  const isOpen  = s.open || false;

  let cardCls = '';
  if (state === 'ok')    cardCls = 'done-ok';
  if (state === 'ko')    cardCls = 'done-ko';
  if (state === 'fixed') cardCls = 'done-fixed';
  if (isOpen)            cardCls += ' open';

  const stateLabel = state === 'ok'
    ? `<span style="color:var(--green);">✓ Check OK</span> · ${formatTime(s.ts)}`
    : state === 'fixed'
    ? `<span style="color:var(--green);">✓ Risolto in autonomia</span> · ${formatTime(s.ts)}`
    : state === 'ko'
    ? `<span style="color:var(--red);">✕ Anomalia</span> · ${formatTime(s.ts)}`
    : '';

  return `
  <div class="check-card ${cardCls}" id="card-${item.id}">
    <div class="check-card-header" data-id="${item.id}">
      <div class="check-status-dot"></div>
      <div class="check-card-name">${item.name}</div>
      ${stateLabel ? `<div class="check-card-meta">${stateLabel}</div>` : ''}
      <div class="check-card-arrow">▼</div>
    </div>
    <div class="check-card-body">
      <div class="check-body-desc">${item.desc}</div>

      <div class="check-action-btns">
        <button class="btn-check-ok" data-id="${item.id}">
          ✓ Check fatto, tutto bene
        </button>
        <button class="btn-check-ko" data-id="${item.id}">
          ✕ Check fallito
        </button>
      </div>

      <div class="done-stamp">
        ${state === 'ok' ? '✓ Completato alle ' + formatTime(s.ts) : ''}
        ${state === 'fixed' ? '✓ Anomalia risolta alle ' + formatTime(s.ts) : ''}
      </div>

      ${renderResolutionPanel(item, s)}
    </div>
  </div>`;
}

function renderResolutionPanel(item, s) {
  const isKo   = s.state === 'ko' || s.showPanel;
  const panelCls = isKo ? 'open' : '';
  const failTs = s.failTs ? formatTime(s.failTs) : '';

  const fixes = (item.quickFixes || []).map(fix => {
    const applied = s.fixApplied === fix;
    return `<button class="fix-btn ${applied ? 'applied' : ''}" data-id="${item.id}" data-fix="${fix}">
      <span class="fix-icon">${applied ? '✓' : '🔧'}</span>${fix}
    </button>`;
  }).join('');

  return `
  <div class="resolution-panel ${panelCls}" id="panel-${item.id}">
    <div class="res-header">
      ✕ Anomalia rilevata
      <span class="res-time">${failTs ? 'ore ' + failTs : ''}</span>
    </div>

    ${fixes ? `
    <div class="res-label">Soluzioni rapide</div>
    <div class="quick-fixes">${fixes}</div>` : ''}

    <div class="res-note">
      <div class="res-label" style="margin-bottom:6px;">Note intervento</div>
      <textarea class="res-note-input" data-id="${item.id}"
        placeholder="Descrivi il problema e le azioni intraprese...">${s.note || ''}</textarea>
    </div>

    <div class="res-outcome-btns">
      <button class="btn-resolved" data-id="${item.id}">✓ Problema risolto</button>
    </div>

    <div class="res-divider"></div>

    <button class="btn-intervento" data-id="${item.id}" data-name="${item.name}">
      ⚠ Necessita di intervento → Apri rapporto di intervento
    </button>
  </div>`;
}

/* ─────────────────────────────────────
   ACTIONS
───────────────────────────────────── */
function toggleCard(id) {
  if (!checkState[id]) checkState[id] = {};
  checkState[id].open = !checkState[id].open;
  renderAll();
}

function markOk(id) {
  checkState[id] = { ...checkState[id], state: 'ok', ts: new Date().toISOString(), open: false };
  autosave(id);
  updateSaveButton();
  renderAll();
  toast('Check completato ✓', 'success');
}

function markKo(id) {
  checkState[id] = { ...checkState[id], state: 'ko', ts: new Date().toISOString(), failTs: new Date().toISOString(), showPanel: true, open: true };
  autosave(id);
  updateSaveButton();
  renderAll();
  // scroll to panel
  setTimeout(() => {
    const panel = document.getElementById(`panel-${id}`);
    panel?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function applyFix(id, fix) {
  if (!checkState[id]) checkState[id] = {};
  checkState[id].fixApplied = fix;
  autosave(id);
  updateSaveButton();
  // Re-render just the fixes
  const allItems = Object.values(CHECK_ITEMS).flat().flatMap(s => s?.items || []);
  renderAll();
  toast(`Soluzione applicata: ${fix}`, 'info');
}

function markFixed(id) {
  if (!checkState[id]) checkState[id] = {};
  const note = document.querySelector(`.res-note-input[data-id="${id}"]`)?.value || checkState[id].note || '';
  checkState[id] = { ...checkState[id], state: 'fixed', ts: new Date().toISOString(), note, open: false, showPanel: false };
  autosave(id);
  updateSaveButton();
  renderAll();
  toast('Anomalia risolta ✓', 'success');
}

function goToIntervento(id) {
  const sections = CHECK_ITEMS[currentRoom] || [];
  const allItems  = sections.flatMap(s => s.items);
  const item      = allItems.find(i => i.id === id);
  const note      = document.querySelector(`.res-note-input[data-id="${id}"]`)?.value || '';
  if (!checkState[id]) checkState[id] = {};
  checkState[id].note = note;

  // salva SOLO questa voce (non chiudere l'intero check: potrebbe non essere completo)
  const t = todayStr();
  db.saveCheckState(currentRoom, t, sessionKey(id), checkState[id]).catch(() => {});

  // Passa i dati alla pagina rapporto tramite sessionStorage (incluso il riferimento
  // per collegare/riusare l'eventuale ticket già aperto per questa voce)
  const room = ROOMS.find(r => r.id === currentRoom);
  sessionStorage.setItem('rapporto_prefill', JSON.stringify({
    fromCheck: id,
    checkName: item?.name || id,
    room: currentRoom,
    roomLabel: `${room?.name} ${room?.city}`,
    note,
    fixApplied: checkState[id]?.fixApplied || '',
    ts: checkState[id]?.failTs || new Date().toISOString(),
    date: t,
    session: currentSession,
    ticketId: getCheckTicket(currentRoom, t, currentSession, id) || '',
  }));

  window.location.href = 'rapporto.html';
}

/* ─────────────────────────────────────
   STORICO
───────────────────────────────────── */
const MONTH_NAMES = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];

async function getStoricoSessions() {
  // 1. Storico importato (Solaria Roma/Milano condividono lo storico di riferimento)
  let historical = [];
  if (currentRoom.startsWith('solaria') && typeof STORICO_SOLARIA_ROMA !== 'undefined') {
    historical = STORICO_SOLARIA_ROMA.map(s => ({ ...s, source: 'import' }));
  }
  const allItems = (CHECK_ITEMS[currentRoom] || []).flatMap(s => s.items);
  // 2. Sessioni live dal DATABASE, raggruppate per (data, sessione) → più report nella stessa giornata
  const rows = await db.getRoomChecks(currentRoom);
  const groups = {};
  for (const r of (rows || [])) {
    const { s, id } = parseSession(r.check_id);
    const gk = `${r.date}#${s}`;
    (groups[gk] = groups[gk] || { date: r.date, session: s, items: {} }).items[id] = r;
  }
  const live = Object.values(groups).map(g => {
    const ok = allItems.filter(i => ['ok','fixed'].includes(g.items[i.id]?.state)).length;
    const fails = allItems.filter(i => g.items[i.id]?.state === 'ko')
      .map(i => ({ area: '', comp: i.name, note: g.items[i.id]?.note || '' }));
    return { date: g.date, session: g.session, moment: g.session > 1 ? `Check ${g.session}` : '', ok, ko: fails.length, total: ok + fails.length, fails, source: 'live' };
  });
  return [...live, ...historical];
}

async function renderStorico() {
  const el = document.getElementById('storico-body');
  el.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><div class="empty-title">Carico lo storico…</div></div>';
  const sessions = await getStoricoSessions();

  if (!sessions.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Nessuno storico per questa sala</div><div class="empty-sub">Lo storico si popolerà con i check salvati.</div></div>';
    return;
  }

  // ── STATISTICHE ──
  const total    = sessions.length;
  const perfect  = sessions.filter(s => s.ko === 0).length;
  const withAnom = sessions.filter(s => s.ko > 0).length;
  const totAnom  = sessions.reduce((a,s) => a + s.ko, 0);
  const perfectPct = Math.round(perfect / total * 100);

  // ── ANOMALIE RICORRENTI ──
  const compCount = {};
  sessions.forEach(s => s.fails.forEach(f => { compCount[f.comp] = (compCount[f.comp]||0) + 1; }));
  const recurring = Object.entries(compCount).sort((a,b) => b[1]-a[1]).slice(0, 6);
  const maxRec = recurring.length ? recurring[0][1] : 1;

  // ── HEATMAP per mese ──
  const byMonth = {};
  sessions.forEach(s => {
    if (s.moment === 'live' || !/^\d{4}-\d{2}-\d{2}$/.test(s.date)) return;
    const [y,m,d] = s.date.split('-').map(Number);
    const key = `${y}-${m}`;
    (byMonth[key] = byMonth[key] || {}) ;
    const day = byMonth[key][d] = byMonth[key][d] || { ko:0, ok:0, sessions:0 };
    day.ko += s.ko; day.ok += s.ok; day.sessions++;
  });
  const monthKeys = Object.keys(byMonth).sort((a,b) => {
    const [ay,am]=a.split('-').map(Number), [by,bm]=b.split('-').map(Number);
    return ay-by || am-bm;
  });

  function dayColor(day) {
    if (!day || !day.sessions) return 'rgba(255,255,255,.05)';
    if (day.ko === 0) return 'rgba(134,188,37,.55)';
    if (day.ko <= 2)  return 'rgba(240,160,48,.75)';
    return 'rgba(255,77,77,.8)';
  }

  const heatmapHtml = monthKeys.map(mk => {
    const [y,m] = mk.split('-').map(Number);
    const daysInMonth = new Date(y, m, 0).getDate();
    let cells = '';
    for (let d = 1; d <= daysInMonth; d++) {
      const day = byMonth[mk][d];
      const tip = day ? `${d} ${MONTH_NAMES[m-1]}: ${day.ok} ok, ${day.ko} anomalie` : `${d} ${MONTH_NAMES[m-1]}: nessun check`;
      cells += `<div title="${tip}" style="width:15px;height:15px;border-radius:3px;background:${dayColor(day)};"></div>`;
    }
    return `<div style="margin-bottom:10px;">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:5px;">${MONTH_NAMES[m-1]} ${y}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;">${cells}</div>
    </div>`;
  }).join('');

  // ── ELENCO SESSIONI (più recenti prima) ──
  const listHtml = sessions
    .slice()
    .sort((a,b) => (b.date > a.date ? 1 : b.date < a.date ? -1 : ((b.session||1) - (a.session||1))))
    .slice(0, 60)
    .map(s => {
      const momentBadge = (s.session > 1) ? `<span style="font-size:10px;color:var(--orange);font-weight:700;">● Check ${s.session}</span>`
        : s.moment === 'morning' ? '<span style="font-size:10px;color:#4da6ff;">🌅 Mattino</span>'
        : s.moment === 'evening' ? '<span style="font-size:10px;color:var(--orange);">🌆 Sera</span>'
        : '<span style="font-size:10px;color:var(--green);">● Live</span>';
      const dateFmt = /^\d{4}-\d{2}-\d{2}$/.test(s.date)
        ? new Date(s.date).toLocaleDateString('it-IT', { weekday:'short', day:'numeric', month:'short' })
        : s.date;
      return `
      <div style="border:1px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:8px;${s.ko>0?'border-left:3px solid var(--red);':''}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
          <div style="font-weight:700;font-size:13px;text-transform:capitalize;">${dateFmt} ${momentBadge}</div>
          <div style="display:flex;gap:12px;font-size:12px;">
            <span style="color:var(--green);">✓ ${s.ok}</span>
            <span style="color:${s.ko?'var(--red)':'var(--text-muted)'};">✕ ${s.ko}</span>
          </div>
        </div>
        ${s.fails.length ? `<div style="margin-top:6px;font-size:12px;color:var(--text-muted);">
          ${s.fails.map(f => `<span style="color:var(--red);font-weight:600;">${f.comp}</span>${f.note ? ' — '+f.note : ''}`).join(' · ')}
        </div>` : ''}
      </div>`;
    }).join('');

  el.innerHTML = `
    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;">
      <div style="background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:22px;font-weight:800;">${total}</div>
        <div style="font-size:11px;color:var(--text-muted);">Sessioni</div>
      </div>
      <div style="background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:22px;font-weight:800;color:var(--green);">${perfectPct}%</div>
        <div style="font-size:11px;color:var(--text-muted);">Giornate perfette</div>
      </div>
      <div style="background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:22px;font-weight:800;color:${withAnom?'var(--orange)':'var(--text-muted)'};">${withAnom}</div>
        <div style="font-size:11px;color:var(--text-muted);">Con anomalie</div>
      </div>
      <div style="background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:22px;font-weight:800;color:${totAnom?'var(--red)':'var(--text-muted)'};">${totAnom}</div>
        <div style="font-size:11px;color:var(--text-muted);">Anomalie totali</div>
      </div>
    </div>

    ${recurring.length ? `
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:10px;">⚠ Anomalie ricorrenti</div>
      ${recurring.map(([comp,n]) => `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
          <div style="width:130px;font-size:12px;font-weight:600;flex-shrink:0;">${comp}</div>
          <div style="flex:1;height:8px;background:var(--bg-card2);border-radius:4px;overflow:hidden;">
            <div style="width:${Math.round(n/maxRec*100)}%;height:100%;background:var(--red);"></div>
          </div>
          <div style="font-size:12px;color:var(--text-muted);width:36px;text-align:right;">${n}×</div>
        </div>`).join('')}
    </div>` : ''}

    ${heatmapHtml ? `
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:10px;">📅 Calendario check</div>
      ${heatmapHtml}
      <div style="display:flex;gap:14px;font-size:11px;color:var(--text-muted);margin-top:6px;">
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:3px;background:rgba(134,188,37,.55);display:inline-block;"></span>Tutto ok</span>
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:3px;background:rgba(240,160,48,.75);display:inline-block;"></span>1-2 anomalie</span>
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:3px;background:rgba(255,77,77,.8);display:inline-block;"></span>3+ anomalie</span>
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:3px;background:rgba(255,255,255,.05);display:inline-block;"></span>Nessun check</span>
      </div>
    </div>` : ''}

    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:10px;">🗒 Sessioni recenti</div>
    ${listHtml}`;
}
</script>
