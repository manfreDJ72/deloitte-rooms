<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Accesso – Deloitte Room Management</title>
  <link rel="stylesheet" href="css/style.css?v=42">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">

    <div class="login-logos">
      <img src="assets/area62.png" alt="Area62" class="logo-area62">
      <div class="lsep"></div>
      <img src="assets/deloitte.svg" alt="Deloitte" class="logo-deloitte">
    </div>

    <h1 class="login-headline">Room Management</h1>
    <p class="login-sub">Solaria &amp; Armonia · Gestione sale Deloitte</p>

    <div class="login-error" id="login-error"></div>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" id="email"
               placeholder="utente@area62.it" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" id="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">
        Accedi
      </button>
    </form>

    <p class="login-foot">
      Area62 Srl · Sistema di gestione immersiva Deloitte<br>
      Accesso riservato al personale autorizzato
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js?v=42"></script>
<script src="js/app.js?v=42"></script>
<script src="js/db.js?v=42"></script>
<script>
  (function(){
    const _u = ls(LS.user);
    if (_u && (DEMO_MODE || _u.sb)) window.location.href = 'dashboard.html';
    else if (_u && !_u.sb) localStorage.removeItem(LS.user); // pulisci vecchia sessione demo
  })();

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const pw    = document.getElementById('password').value;
    const err   = document.getElementById('login-error');
    const btn   = e.target.querySelector('button[type=submit]');

    btn.disabled = true;
    btn.textContent = 'Accesso in corso...';
    err.style.display = 'none';

    try {
      await db.signIn(email, pw);
      btn.textContent = 'Caricamento dati...';
      try { await db.hydrateAll(); } catch (h) { console.error('hydrate', h); }
      window.location.href = 'dashboard.html';
    } catch (ex) {
      err.textContent = ex.message || 'Email o password non corretti.';
      err.style.display = 'block';
      document.getElementById('password').value = '';
      btn.disabled = false;
      btn.textContent = 'Accedi';
    }
  });
</script>
</body>
</html>
