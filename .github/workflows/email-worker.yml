name: Email Worker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: email-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install --quiet dateparser
      - name: Esegui worker
        env:
          SB_USER: automation@area62.it
          SB_PASS: ${{ secrets.SB_PASS }}
          MAIL_USER: deloitte.room@area62.it
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
        run: python scripts/email_worker.py
